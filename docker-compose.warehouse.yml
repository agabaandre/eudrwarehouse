# Modern data warehouse stack: Apache Doris + Apache Superset
# Usage: docker compose -f docker-compose.yml -f docker-compose.warehouse.yml up --build
#
# Doris requires FE_SERVERS=name:ip:port (not fe1:9010). Static IPs on doris_net.

networks:
  doris_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.80.0/24

services:
  doris-fe:
    image: ${DORIS_FE_IMAGE:-apache/doris:fe-2.1.7}
    hostname: doris-fe
    environment:
      FE_SERVERS: fe1:172.20.80.2:9010
      FE_ID: 1
    ports:
      - "8030:8030"
      - "9030:9030"
    volumes:
      - doris_fe_data:/opt/apache-doris/fe/doris-meta
    networks:
      doris_net:
        ipv4_address: 172.20.80.2
      default: {}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8030/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 180s

  doris-be:
    image: ${DORIS_BE_IMAGE:-apache/doris:be-2.1.7}
    hostname: doris-be
    environment:
      FE_SERVERS: fe1:172.20.80.2:9010
      BE_ADDR: 172.20.80.3:9050
    depends_on:
      doris-fe:
        condition: service_healthy
    volumes:
      - doris_be_data:/opt/apache-doris/be/storage
    networks:
      doris_net:
        ipv4_address: 172.20.80.3
      default: {}
    shm_size: 2gb
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8040/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 240s

  superset:
    build: ./superset
    environment:
      SUPERSET_SECRET_KEY: maaif-eudr-superset-secret
      SUPERSET_ADMIN_USER: admin
      SUPERSET_ADMIN_PASSWORD: admin
      SUPERSET_ADMIN_EMAIL: admin@superset.com
      SUPERSET_PUBLIC_MODE: ${SUPERSET_PUBLIC_ENABLED:-false}
      SUPERSET_WEBSERVER_BASEPATH: /superset
      DORIS_HOST: doris-fe
      DORIS_PORT: 9030
      DORIS_DATABASE: eudr_analytics
      POSTGRES_HOST: postgres
      POSTGRES_USER: eudr
      POSTGRES_PASSWORD: eudr_secret
      POSTGRES_DB: eudr
    volumes:
      - superset_data:/app/superset_home
    depends_on:
      postgres:
        condition: service_healthy
      doris-fe:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/health || curl -sf http://localhost:8088/login/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 180s

  api:
    environment:
      DORIS_SYNC_ON_START: "true"
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      SUPERSET_URL: ${SUPERSET_URL:-}
      SUPERSET_PUBLIC_ENABLED: ${SUPERSET_PUBLIC_ENABLED:-false}
      WAREHOUSE_SYNC_INTERVAL_MS: ${WAREHOUSE_SYNC_INTERVAL_MS:-300000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      doris-fe:
        condition: service_started

volumes:
  doris_fe_data:
  doris_be_data:
  superset_data:
