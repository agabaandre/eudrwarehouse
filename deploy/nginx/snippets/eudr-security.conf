# Rate limiting zones — include from main server block:
#   include /etc/nginx/snippets/eudr-security.conf;

# General API / SPA traffic: 30 req/s per IP with burst
limit_req_zone $binary_remote_addr zone=eudr_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=eudr_api:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=eudr_auth:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=eudr_conn:10m;

# Block common scanner user agents (adjust for legitimate bots as needed)
map $http_user_agent $eudr_bad_bot {
    default 0;
    ~*nikto 1;
    ~*sqlmap 1;
    ~*masscan 1;
    ~*zgrab 1;
    ~*dirbuster 1;
    ~*gobuster 1;
    ~*nmap 1;
    ~*nessus 1;
    ~*acunetix 1;
    "" 1;
}

# Security headers (supplement Express headers)
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# Hide nginx version
server_tokens off;
