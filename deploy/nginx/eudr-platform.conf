# Nginx reverse proxy for the EUDR platform.
# Platform:  port 80 → http://127.0.0.1:__API_HOST_PORT__  (external :8003)
# Superset:   /superset/* → http://127.0.0.1:__SUPERSET_HOST_PORT__/*  (prefix stripped)
#
# Install: sudo ./scripts/setup-nginx.sh
# __API_HOST_PORT__ / __SUPERSET_HOST_PORT__ replaced from .env

include /etc/nginx/snippets/eudr-security.conf;

upstream eudr_api {
    server 127.0.0.1:__API_HOST_PORT__;
    keepalive 32;
}

upstream eudr_superset {
    server 127.0.0.1:__SUPERSET_HOST_PORT__;
    keepalive 8;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    client_max_body_size 50M;
    client_body_timeout 30s;
    send_timeout 30s;

    if ($eudr_bad_bot) {
        return 403;
    }

    limit_conn eudr_conn 50;

    # Apache Superset — MUST use ^~ so static-file regex below does not steal /superset/static/*
    # Strip /superset/ prefix: browser /superset/login/ → upstream /login/
    location ^~ /superset/ {
        limit_req zone=eudr_general burst=30 nodelay;
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_pass http://eudr_superset/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Script-Name /superset;
        proxy_set_header X-Forwarded-Prefix /superset;
        proxy_cookie_path / /superset/;
        proxy_redirect ~^/(.*)$ /superset/$1;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /superset {
        return 301 /superset/login/;
    }

    # Static assets for Vue SPA only (exclude /superset/)
    location ~* ^/(?!superset/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://eudr_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location = /api/auth/login {
        limit_req zone=eudr_auth burst=3 nodelay;
        proxy_pass http://eudr_api;
        include /etc/nginx/snippets/eudr-proxy.conf;
    }

    location /api/ {
        limit_req zone=eudr_api burst=80 nodelay;
        proxy_pass http://eudr_api;
        include /etc/nginx/snippets/eudr-proxy.conf;
    }

    location /management {
        limit_req zone=eudr_general burst=20 nodelay;
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
        proxy_pass http://eudr_api;
        include /etc/nginx/snippets/eudr-proxy.conf;
    }

    location = /robots.txt {
        proxy_pass http://eudr_api;
        include /etc/nginx/snippets/eudr-proxy.conf;
    }

    location = /sitemap.xml {
        proxy_pass http://eudr_api;
        include /etc/nginx/snippets/eudr-proxy.conf;
    }

    location / {
        limit_req zone=eudr_general burst=40 nodelay;
        proxy_pass http://eudr_api;
        include /etc/nginx/snippets/eudr-proxy.conf;
    }
}
