# Production overlay — bind the API to all interfaces for remote access.
# Usage:
#   export PUBLIC_BASE_URL=http://YOUR_SERVER_IP:3000
#   export JWT_SECRET=your-secure-secret
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  # No host port — API/Superset reach postgres via the Docker network (postgres:5432).
  # Avoids conflicts when the server already runs PostgreSQL on 5432.
  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  api:
    ports:
      - "0.0.0.0:${PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      SUPERSET_URL: ${SUPERSET_URL:-}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in production}
      CLUSTER_WORKERS: ${CLUSTER_WORKERS:-2}
      PG_POOL_MAX: ${PG_POOL_MAX:-25}
      RATE_LIMIT_API_MAX: ${RATE_LIMIT_API_MAX:-300}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-20}
      CACHE_TTL_ANALYTICS: ${CACHE_TTL_ANALYTICS:-120}
      CACHE_TTL_GEO: ${CACHE_TTL_GEO:-3600}
    restart: unless-stopped
