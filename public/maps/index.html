<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geospatial Maps — MAAIF EUDR</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <script src="https://code.highcharts.com/maps/modules/map.js"></script>
  <script src="https://code.highcharts.com/modules/exporting.js"></script>
  <style>
    .map-tabs { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem; }
    .map-tab { padding:0.5rem 1rem; border:1px solid #e5e7eb; border-radius:8px; background:white; cursor:pointer; font-size:0.9rem; }
    .map-tab.active { background:#1a7f37; color:white; border-color:#1a7f37; }
    .map-panel { min-height:500px; }
  </style>
</head>
<body>
  <header class="header">
    <div>
      <h1>EUDR Geospatial Map Gallery</h1>
      <div class="subtitle">Compliance, risk, regional & farm-level visualizations</div>
    </div>
    <nav>
      <a href="/">Home</a>
      <a href="/analytics/">Analytics</a>
      <a href="/management/">Management</a>
    </nav>
  </header>

  <div class="container">
    <div class="filter-bar">
      <div>
        <label>Metric</label><br>
        <select id="metric-select">
          <option value="compliance_rate">Compliance Rate</option>
          <option value="risk_score">Risk Score</option>
          <option value="production_tons">Production (tons)</option>
        </select>
      </div>
    </div>

    <div class="map-tabs" id="layer-tabs"></div>

    <div class="chart-box map-panel">
      <h3 id="map-title">Select a map layer</h3>
      <div id="map-chart" style="height:480px"></div>
    </div>

    <div class="card" style="margin-top:1.5rem">
      <h3>Available Geo Layers (API)</h3>
      <div class="table-wrap">
        <table id="layers-table">
          <thead><tr><th>Layer ID</th><th>Name</th><th>Type</th><th>Endpoint</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <footer class="footer">MAAIF EUDR — Geospatial Map Gallery</footer>
  <script src="/js/common.js"></script>
  <script src="/js/maps.js"></script>
</body>
</html>
