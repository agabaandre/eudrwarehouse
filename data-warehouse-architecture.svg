<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 780" role="img" aria-labelledby="title desc">
  <title id="title">MAAIF EUDR Platform - Data Warehouse Architecture</title>
  <desc id="desc">Mobile field app, upstream sources, Apache Doris OLAP, and downstream BI, AI, and officer dashboards for Uganda EUDR compliance.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f7f5"/>
      <stop offset="100%" stop-color="#ecf2ee"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#062e1c"/>
      <stop offset="55%" stop-color="#0f5132"/>
      <stop offset="100%" stop-color="#134e28"/>
    </linearGradient>
    <linearGradient id="engineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f5132"/>
      <stop offset="100%" stop-color="#198754"/>
    </linearGradient>
    <linearGradient id="tricolor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="33.33%" stop-color="#000000"/>
      <stop offset="33.33%" stop-color="#fcdc04"/>
      <stop offset="66.66%" stop-color="#fcdc04"/>
      <stop offset="66.66%" stop-color="#d90000"/>
      <stop offset="100%" stop-color="#d90000"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#062e1c" flood-opacity="0.10"/>
    </filter>
    <filter id="engineShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#062e1c" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#198754"/>
    </marker>
    <style>
      .title { font: 700 28px Inter, Segoe UI, system-ui, sans-serif; fill: #ffffff; }
      .subtitle { font: 400 14px Inter, Segoe UI, system-ui, sans-serif; fill: rgba(255,255,255,0.82); }
      .section { font: 700 11px Inter, Segoe UI, system-ui, sans-serif; fill: #0f5132; letter-spacing: 0.14em; }
      .boxTitle { font: 700 13px Inter, Segoe UI, system-ui, sans-serif; fill: #0a1f14; }
      .boxSub { font: 500 10px Inter, Segoe UI, system-ui, sans-serif; fill: #5c7368; letter-spacing: 0.08em; }
      .chip { font: 600 11px Inter, Segoe UI, system-ui, sans-serif; fill: #134e28; }
      .chipAlt { font: 600 11px Inter, Segoe UI, system-ui, sans-serif; fill: #1e4d8c; }
      .chipWarn { font: 600 11px Inter, Segoe UI, system-ui, sans-serif; fill: #9a3412; }
      .chipMobile { font: 600 11px Inter, Segoe UI, system-ui, sans-serif; fill: #c2410c; }
      .engineTitle { font: 700 22px Inter, Segoe UI, system-ui, sans-serif; fill: #ffffff; }
      .engineSub { font: 500 12px Inter, Segoe UI, system-ui, sans-serif; fill: rgba(255,255,255,0.88); }
      .engineMeta { font: 600 10px Inter, Segoe UI, system-ui, sans-serif; fill: rgba(255,255,255,0.72); letter-spacing: 0.06em; }
      .footer { font: 500 11px Inter, Segoe UI, system-ui, sans-serif; fill: #5c7368; }
      .flowLabel { font: 600 10px Inter, Segoe UI, system-ui, sans-serif; fill: #198754; letter-spacing: 0.06em; }
    </style>
  </defs>

  <rect width="1280" height="780" fill="url(#bg)"/>
  <rect width="1280" height="4" fill="url(#tricolor)"/>

  <rect y="4" width="1280" height="92" fill="url(#headerGrad)"/>
  <rect y="96" width="1280" height="2" fill="rgba(252,220,4,0.35)"/>
  <text x="48" y="48" class="title">MAAIF EUDR Platform</text>
  <text x="48" y="72" class="subtitle">Ministry of Agriculture, Animal Industry and Fisheries - Uganda | Data Warehouse Architecture</text>
  <text x="1232" y="48" text-anchor="end" class="subtitle">Mobile App | PostgreSQL | Doris | Superset / AI / Dashboards</text>
  <text x="1232" y="72" text-anchor="end" class="subtitle">Star schema: eudr_analytics</text>

  <text x="170" y="138" text-anchor="middle" class="section">01 UPSTREAM - SOURCES</text>
  <text x="640" y="138" text-anchor="middle" class="section">02 THE ENGINE</text>
  <text x="1110" y="138" text-anchor="middle" class="section">03 DOWNSTREAM - CONSUMERS</text>

  <g filter="url(#cardShadow)">
    <rect x="48" y="156" width="244" height="104" rx="16" fill="#ffffff" stroke="#d8e5de"/>
    <rect x="48" y="156" width="244" height="6" rx="3" fill="#336791"/>
    <text x="170" y="188" text-anchor="middle" class="boxTitle">PostgreSQL 16</text>
    <text x="170" y="206" text-anchor="middle" class="boxSub">OLTP / SYSTEM OF RECORD</text>
    <text x="72" y="232" class="chip">Farmers | Plots | GPS</text>
    <text x="72" y="250" class="chip">Compliance | Exporters</text>

    <rect x="48" y="276" width="244" height="104" rx="16" fill="#ffffff" stroke="#d8e5de"/>
    <rect x="48" y="276" width="244" height="6" rx="3" fill="#fcdc04"/>
    <text x="170" y="308" text-anchor="middle" class="boxTitle">Data Ingestion</text>
    <text x="170" y="326" text-anchor="middle" class="boxSub">CSV | EXCEL | REST API</text>
    <text x="72" y="352" class="chipAlt">Bulk officer uploads</text>
    <text x="72" y="370" class="chipAlt">Registration pipelines</text>

    <rect x="48" y="396" width="244" height="104" rx="16" fill="#ffffff" stroke="#d8e5de"/>
    <rect x="48" y="396" width="244" height="6" rx="3" fill="#ea580c"/>
    <text x="170" y="424" text-anchor="middle" class="boxTitle">MAAIF EUDR Field App</text>
    <text x="170" y="442" text-anchor="middle" class="boxSub">ANDROID | iOS | OFFLINE GPS</text>
    <text x="72" y="468" class="chipMobile">Plot boundaries | GeoJSON</text>
    <text x="72" y="486" class="chipMobile">POST /api/mobile | /api/channels</text>

    <rect x="48" y="516" width="244" height="88" rx="16" fill="#ffffff" stroke="#d8e5de"/>
    <rect x="48" y="516" width="244" height="6" rx="3" fill="#d90000"/>
    <text x="170" y="546" text-anchor="middle" class="boxTitle">Field Channels</text>
    <text x="170" y="564" text-anchor="middle" class="boxSub">USSD | SMS | WEB</text>
    <text x="72" y="588" class="chipWarn">USSD *284# | SMS alerts</text>
  </g>

  <rect x="330" y="318" width="180" height="132" rx="18" fill="#ffffff" stroke="#198754" stroke-dasharray="6 4" filter="url(#cardShadow)"/>
  <text x="420" y="350" text-anchor="middle" class="boxTitle">Node.js API</text>
  <text x="420" y="368" text-anchor="middle" class="boxSub">ETL ORCHESTRATION</text>
  <text x="348" y="396" class="chip">JWT | Rate limits</text>
  <text x="348" y="416" class="chip">Warehouse sync</text>
  <rect x="348" y="426" width="144" height="28" rx="14" fill="#ecfdf3" stroke="#198754"/>
  <text x="420" y="444" text-anchor="middle" class="chip">Redis 7 cache</text>

  <g filter="url(#engineShadow)">
    <rect x="520" y="268" width="240" height="240" rx="28" fill="url(#engineGrad)"/>
    <rect x="520" y="268" width="240" height="8" rx="4" fill="rgba(252,220,4,0.55)"/>
    <circle cx="640" cy="338" r="34" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
    <text x="640" y="346" text-anchor="middle" class="engineTitle">D</text>
    <text x="640" y="392" text-anchor="middle" class="engineTitle">Apache Doris</text>
    <text x="640" y="416" text-anchor="middle" class="engineSub">OLAP | Star Schema</text>
    <text x="640" y="442" text-anchor="middle" class="engineMeta">eudr_analytics</text>
    <text x="640" y="462" text-anchor="middle" class="engineMeta">dim_* | fact_* | agg_*</text>
    <text x="640" y="488" text-anchor="middle" class="engineMeta">Columnar analytics warehouse</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="988" y="156" width="244" height="96" rx="16" fill="#ffffff" stroke="#d8e5de"/>
    <rect x="988" y="156" width="244" height="6" rx="3" fill="#20a7c9"/>
    <text x="1110" y="186" text-anchor="middle" class="boxTitle">BI and Visualization</text>
    <text x="1110" y="204" text-anchor="middle" class="boxSub">DASHBOARDS | SQL LAB</text>
    <text x="1012" y="228" class="chipAlt">Apache Superset 3.1</text>
    <text x="1012" y="246" class="chipAlt">Highcharts | React SPA</text>

    <rect x="988" y="268" width="244" height="96" rx="16" fill="#ffffff" stroke="#d8e5de"/>
    <rect x="988" y="268" width="244" height="6" rx="3" fill="#7c3aed"/>
    <text x="1110" y="298" text-anchor="middle" class="boxTitle">AI and Analytics</text>
    <text x="1110" y="316" text-anchor="middle" class="boxSub">LLM | COMPLIANCE CONTEXT</text>
    <text x="1012" y="340" class="chip">AI Compliance Assistant</text>
    <text x="1012" y="358" class="chip">Live KPIs | Web search</text>

    <rect x="988" y="380" width="244" height="96" rx="16" fill="#ffffff" stroke="#d8e5de"/>
    <rect x="988" y="380" width="244" height="6" rx="3" fill="#0f5132"/>
    <text x="1110" y="410" text-anchor="middle" class="boxTitle">Officer Views</text>
    <text x="1110" y="428" text-anchor="middle" class="boxSub">MAPS | MANAGEMENT</text>
    <text x="1012" y="452" class="chip">Geospatial farm layers</text>
    <text x="1012" y="470" class="chip">Strategic dashboard</text>

    <rect x="988" y="492" width="244" height="112" rx="16" fill="#ffffff" stroke="#d8e5de"/>
    <rect x="988" y="492" width="244" height="6" rx="3" fill="#ea580c"/>
    <text x="1110" y="522" text-anchor="middle" class="boxTitle">MAAIF EUDR Field App</text>
    <text x="1110" y="540" text-anchor="middle" class="boxSub">FIELD OFFICERS | FARMERS</text>
    <text x="1012" y="564" class="chipMobile">Farm registration | GPS plots</text>
    <text x="1012" y="582" class="chipMobile">Training videos | USSD *284#</text>
    <text x="1012" y="600" class="chipMobile">Offline sync | SMS confirmations</text>
  </g>

  <path d="M292 208 C318 208, 318 340, 330 340" fill="none" stroke="#198754" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrow)"/>
  <path d="M292 328 C312 328, 318 360, 330 360" fill="none" stroke="#198754" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrow)"/>
  <path d="M292 448 C318 448, 318 390, 330 390" fill="none" stroke="#198754" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrow)"/>
  <text x="310" y="438" class="flowLabel">mobile</text>
  <path d="M292 560 C318 560, 318 420, 330 420" fill="none" stroke="#198754" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrow)"/>

  <path d="M510 384 L520 384" fill="none" stroke="#198754" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="515" y="374" text-anchor="middle" class="flowLabel">ETL</text>

  <path d="M760 338 C860 338, 900 204, 988 204" fill="none" stroke="#198754" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrow)"/>
  <path d="M760 388 C870 388, 920 316, 988 316" fill="none" stroke="#198754" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrow)"/>
  <path d="M760 428 C860 428, 900 428, 988 428" fill="none" stroke="#198754" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrow)"/>
  <path d="M760 468 C860 468, 900 548, 988 548" fill="none" stroke="#198754" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrow)"/>
  <text x="870" y="538" class="flowLabel">REST API</text>

  <path d="M760 468 C820 520, 860 560, 420 470" fill="none" stroke="#ea580c" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="620" y="556" class="flowLabel" fill="#c2410c">sync back</text>

  <rect x="48" y="648" width="1184" height="96" rx="18" fill="#ffffff" stroke="#d8e5de" filter="url(#cardShadow)"/>
  <rect x="48" y="648" width="1184" height="4" rx="2" fill="url(#tricolor)"/>
  <text x="72" y="682" class="boxTitle">Star schema in Doris (eudr_analytics)</text>
  <text x="72" y="706" class="footer">Dimensions: dim_district | dim_date | dim_commodity</text>
  <text x="72" y="726" class="footer">Facts: fact_production | fact_compliance | fact_exports | fact_farm_geo | agg_regional_summary</text>
  <text x="1232" y="706" text-anchor="end" class="footer">Mobile: POST /api/mobile | /api/channels/mobile/register</text>
  <text x="1232" y="726" text-anchor="end" class="footer">Sync: startup | every 5 min | POST /api/warehouse/sync | nginx /superset/</text>
</svg>
