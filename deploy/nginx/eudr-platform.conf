# Nginx reverse proxy for the EUDR platform.
# Docker API listens on 127.0.0.1:3000; nginx exposes it on port 80 (mapped externally as 8003).
#
# Install on the server:
#   sudo ./scripts/setup-nginx.sh
#
# Then redeploy with the public URL on port 8003:
#   export PUBLIC_BASE_URL=http://41.186.86.12:8003
#   ./scripts/deploy.sh 41.186.86.12

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Accept any hostname/IP — update if you add a domain later
    server_name _;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

