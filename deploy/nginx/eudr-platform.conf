# Nginx reverse proxy for the EUDR platform.
# Platform:  port 80 → http://127.0.0.1:3000  (external :8003)
# Superset:   /superset/ → http://127.0.0.1:8088/superset/
#
# Install: sudo ./scripts/setup-nginx.sh
# Security: see deploy/nginx/snippets/eudr-security.conf and deploy/fail2ban/

include /etc/nginx/snippets/eudr-security.conf;

upstream eudr_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    client_max_body_size 50M;
    client_body_timeout 30s;
    send_timeout 30s;

    # Block known bad bots
    if ($eudr_bad_bot) {
        return 403;
    }

    # Connection limit per IP
    limit_conn eudr_conn 50;

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://eudr_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Auth endpoints — strict rate limit
    location = /api/auth/login {
        limit_req zone=eudr_auth burst=3 nodelay;
        proxy_pass http://eudr_api;
        include /etc/nginx/snippets/eudr-proxy.conf;
    }

    # API — higher throughput
    location /api/ {
        limit_req zone=eudr_api burst=80 nodelay;
        proxy_pass http://eudr_api;
        include /etc/nginx/snippets/eudr-proxy.conf;
    }

    # Admin dashboard — no indexing
    location /management {
        limit_req zone=eudr_general burst=20 nodelay;
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
        proxy_pass http://eudr_api;
        include /etc/nginx/snippets/eudr-proxy.conf;
    }

    # Apache Superset BI (warehouse stack must be running)
    location /superset/ {
        limit_req zone=eudr_general burst=30 nodelay;
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_pass http://127.0.0.1:8088/superset/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /superset;
        proxy_redirect off;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /superset {
        return 301 /superset/;
    }

    # SEO files
    location = /robots.txt {
        proxy_pass http://eudr_api;
        include /etc/nginx/snippets/eudr-proxy.conf;
    }

    location = /sitemap.xml {
        proxy_pass http://eudr_api;
        include /etc/nginx/snippets/eudr-proxy.conf;
    }

    # Vue SPA + fallback
    location / {
        limit_req zone=eudr_general burst=40 nodelay;
        proxy_pass http://eudr_api;
        include /etc/nginx/snippets/eudr-proxy.conf;
    }
}
