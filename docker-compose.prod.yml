# Production overlay — bind the API to all interfaces for remote access.
# Usage:
#   export PUBLIC_BASE_URL=http://YOUR_SERVER_IP:3000
#   export JWT_SECRET=your-secure-secret
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  # No host port — API/Superset reach postgres via the Docker network (postgres:5432).
  # Avoids conflicts when the server already runs PostgreSQL on 5432.
  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  api:
    ports:
      # Host port when 3000 is taken (e.g. Grafana). Set API_HOST_PORT in .env
      - "127.0.0.1:${API_HOST_PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      SUPERSET_URL: ${SUPERSET_URL:-}
      ENABLE_WAREHOUSE: ${ENABLE_WAREHOUSE:-false}
      REDIS_URL: redis://redis:6379
      DORIS_SYNC_ON_START: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      OPENAI_COMPAT_API_KEY: ${OPENAI_COMPAT_API_KEY:-}
      OPENAI_COMPAT_BASE_URL: ${OPENAI_COMPAT_BASE_URL:-}
      OPENAI_COMPAT_MODEL: ${OPENAI_COMPAT_MODEL:-}
      AI_ASSISTANT_ENABLED: ${AI_ASSISTANT_ENABLED:-true}
      AI_DEFAULT_MODEL: ${AI_DEFAULT_MODEL:-gpt-4o-mini}
      AI_PRO_REQUIRES_AUTH: ${AI_PRO_REQUIRES_AUTH:-true}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      CLUSTER_WORKERS: ${CLUSTER_WORKERS:-1}
      PG_POOL_MAX: ${PG_POOL_MAX:-25}
      RATE_LIMIT_API_MAX: ${RATE_LIMIT_API_MAX:-300}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-20}
      CACHE_TTL_ANALYTICS: ${CACHE_TTL_ANALYTICS:-120}
      CACHE_TTL_GEO: ${CACHE_TTL_GEO:-3600}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped
