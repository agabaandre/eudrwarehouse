name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: eudr-platform-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Superset image
        uses: docker/build-push-action@v6
        with:
          context: ./superset
          file: ./superset/Dockerfile
          push: false
          tags: eudr-platform-superset:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate compose configuration
        run: |
          docker compose -f docker-compose.yml config --quiet
          JWT_SECRET=ci-test-secret PUBLIC_BASE_URL=http://127.0.0.1:3000 \
            docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
          JWT_SECRET=ci-test-secret PUBLIC_BASE_URL=http://127.0.0.1:3000 \
            docker compose -f docker-compose.yml -f docker-compose.warehouse.yml -f docker-compose.prod.yml -f docker-compose.prod.warehouse.yml config --quiet

      - name: Smoke test API container
        run: |
          docker compose -f docker-compose.yml up -d --build postgres
          timeout 60 bash -c 'until docker compose -f docker-compose.yml exec -T postgres pg_isready -U eudr -d eudr; do sleep 2; done'
          PUBLIC_BASE_URL=http://127.0.0.1:3000 JWT_SECRET=ci-test-secret \
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build api
          timeout 90 bash -c 'until curl -sf http://127.0.0.1:3000/api/health; do sleep 3; done'
          curl -sf http://127.0.0.1:3000/api/health | grep -q '"status":"ok"'

      - name: Tear down test stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml down -v
